<!doctype html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход – Здравословен Живот</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <div id="navbar"></div>
  <main class="container py-5">
    <div class="row justify-content-center align-items-center g-4">
      <div class="col-lg-5 d-none d-lg-block">
        <img
          src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=800&h=1000&fit=crop"
          class="img-fluid rounded-3 shadow auth-side-image w-100"
          alt="Здравословно хранене"
          loading="lazy"
        />
      </div>
      <div class="col-md-8 col-lg-5">
        <div class="text-center mb-4">
          <i class="bi bi-leaf text-success display-4"></i>
          <h2 class="mt-2">Вход</h2>
          <p class="text-muted">Добре дошли обратно</p>
        </div>
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <div id="loginError" class="alert alert-danger d-none"></div>
            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label">Имейл</label>
                <input type="email" name="email" class="form-control" required placeholder="vashe@email.bg" />
              </div>
              <div class="mb-3">
                <label class="form-label">Парола</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••" />
              </div>
              <button type="submit" class="btn btn-success w-100"><i class="bi bi-box-arrow-in-right"></i> Влез</button>
            </form>
            <p class="text-center mt-3 mb-0 small">Нямате акаунт? <a href="/register.html">Регистрирайте се</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="footer"></div>
  <script type="module" src="/src/js/pages/login.js"></script>
</body>
</html>
