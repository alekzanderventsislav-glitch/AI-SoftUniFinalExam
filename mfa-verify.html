<!doctype html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2FA потвърждение – Здравословен Живот</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <div id="navbar"></div>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="h4 mb-2"><i class="bi bi-shield-check text-success"></i> Потвърждение с 2FA</h1>
            <p class="text-muted">Въведете 6-цифрения код от приложението за автентикация.</p>
            <div id="mfaVerifyError" class="alert alert-danger d-none"></div>
            <form id="mfaVerifyForm">
              <div class="mb-3">
                <label class="form-label">Код</label>
                <input type="text" name="code" class="form-control text-center fs-4" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000" required autocomplete="one-time-code" autofocus />
              </div>
              <button type="submit" class="btn btn-success w-100">Потвърди</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="footer"></div>
  <script type="module" src="/src/js/pages/mfa-verify.js"></script>
</body>
</html>
