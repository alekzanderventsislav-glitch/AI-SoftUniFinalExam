<!doctype html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ панел – Здравословен Живот</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <div id="navbar"></div>
  <main class="container py-4">
    <div class="page-header">
      <h1><i class="bi bi-shield-lock text-danger"></i> Админ панел</h1>
      <p class="text-muted">Управление на рецепти и потребителски роли</p>
    </div>
    <div class="row g-3 mb-4" id="adminStats"></div>
    <div class="row g-4">
      <div class="col-lg-7">
        <div class="card">
          <div class="card-header fw-bold">Всички рецепти</div>
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead><tr><th>Заглавие</th><th>Автор</th><th>Калории</th><th>Дата</th><th></th></tr></thead>
              <tbody id="recipesTable"></tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="col-lg-5">
        <div class="card">
          <div class="card-header fw-bold">Потребители и роли</div>
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead><tr><th>Име</th><th>Роля</th><th>Промяна</th></tr></thead>
              <tbody id="usersTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="footer"></div>
  <script type="module" src="/src/js/pages/admin.js"></script>
</body>
</html>
