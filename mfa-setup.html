<!doctype html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Настройка на 2FA – Здравословен Живот</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <div id="navbar"></div>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="h4 mb-2"><i class="bi bi-shield-lock text-success"></i> Настройка на двуфакторна автентикация</h1>
            <p class="text-muted">Сканирайте QR кода с приложение за автентикация (Google Authenticator, Authy и др.) и въведете 6-цифрения код.</p>
            <div id="mfaSetupError" class="alert alert-danger d-none"></div>
            <div id="mfaSetupContent" class="text-center">
              <div class="spinner-border text-success" role="status"><span class="visually-hidden">Зареждане...</span></div>
            </div>
            <form id="mfaSetupForm" class="d-none">
              <div class="mb-3 text-center" id="mfaQrWrap"></div>
              <p class="small text-muted text-center">Ако не можете да сканирате кода, въведете този ключ ръчно: <code id="mfaSecret"></code></p>
              <div class="mb-3">
                <label class="form-label">Код от приложението</label>
                <input type="text" name="code" class="form-control text-center" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000" required autocomplete="one-time-code" />
              </div>
              <button type="submit" class="btn btn-success w-100">Потвърди и активирай 2FA</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="footer"></div>
  <script type="module" src="/src/js/pages/mfa-setup.js"></script>
</body>
</html>
