<!doctype html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тренировки – Здравословен Живот</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <div id="navbar"></div>
  <main class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-end gap-3 page-header">
      <div>
        <h1>Тренировки</h1>
        <p class="text-muted mb-0">Библиотека с тренировъчни програми</p>
      </div>
      <button id="showFormBtn" class="btn btn-success" type="button"><i class="bi bi-plus-lg"></i> Добави тренировка</button>
    </div>

    <input type="search" id="searchInput" class="form-control mb-3" placeholder="Търсене..." />
    <div class="d-flex flex-wrap gap-2 mb-3">
      <button type="button" id="favoritesToggleBtn" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-heart"></i> Любими
      </button>
    </div>
    <div class="mb-2"><small class="text-muted text-uppercase">Ниво</small></div>
    <div class="d-flex flex-wrap gap-2 mb-3" id="difficultyFilters"></div>
    <div class="mb-2"><small class="text-muted text-uppercase">Цел</small></div>
    <div class="d-flex flex-wrap gap-2 mb-4" id="goalFilters"></div>
    <div class="row g-4" id="workoutGrid"></div>
  </main>
  <div id="footer"></div>

  <div class="modal fade" id="workoutFormModal" tabindex="-1" aria-labelledby="formTitle" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="formTitle">Нова тренировка</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Затвори"></button>
        </div>
        <div class="modal-body">
          <form id="workoutForm" class="row g-3">
            <div class="col-12">
              <label class="form-label">Заглавие</label>
              <input name="workoutTitle" class="form-control" required />
            </div>
            <div class="col-12">
              <label class="form-label">Описание</label>
              <textarea name="description" class="form-control" rows="2" required></textarea>
            </div>
            <div class="col-md-6">
              <label class="form-label">Ниво</label>
              <select name="difficulty" class="form-select" required>
                <option value="beginner">Начинаещ</option>
                <option value="intermediate">Среден</option>
                <option value="advanced">Напреднал</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Цел</label>
              <select name="goal" class="form-select" required>
                <option value="weight-loss">Отслабване</option>
                <option value="muscle-gain">Мускулна маса</option>
                <option value="endurance">Издръжливост</option>
                <option value="flexibility">Гъвкавост</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Продължителност (мин)</label>
              <input type="number" name="duration" class="form-control" min="1" required />
            </div>
            <div class="col-md-4">
              <label class="form-label">Калории</label>
              <input type="number" name="calories" class="form-control" min="0" required />
            </div>
            <div class="col-md-4">
              <label class="form-label">Брой упражнения</label>
              <input type="number" name="exerciseCount" id="exerciseCount" class="form-control" min="1" max="20" value="3" required />
            </div>
            <div class="col-12">
              <label class="form-label">Видимост</label>
              <div class="d-flex flex-wrap gap-3">
                <label class="form-check">
                  <input type="radio" name="visibility" value="public" class="form-check-input" checked />
                  Публична – видима за всички
                </label>
                <label class="form-check">
                  <input type="radio" name="visibility" value="private" class="form-check-input" />
                  Лична – само за мен
                </label>
              </div>
            </div>
            <div class="col-12">
              <label class="form-label">Упражнения</label>
              <div id="exerciseRows" class="d-flex flex-column gap-2"></div>
            </div>
            <div class="col-12">
              <label class="form-label">Изображение (по избор)</label>
              <input type="file" name="image" class="form-control" accept="image/*" />
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отказ</button>
          <button type="submit" form="workoutForm" class="btn btn-success"><i class="bi bi-check-lg"></i> Запази</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="deleteWorkoutModal" tabindex="-1" aria-labelledby="deleteModalTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="deleteModalTitle">Изтриване на тренировка</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Затвори"></button>
        </div>
        <div class="modal-body">
          <p class="mb-0">Сигурни ли сте, че искате да изтриете тази тренировка? Действието не може да бъде отменено.</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отказ</button>
          <button type="button" id="confirmDeleteBtn" class="btn btn-danger"><i class="bi bi-trash"></i> Изтрий</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/js/pages/trenirovki.js"></script>
</body>
</html>
