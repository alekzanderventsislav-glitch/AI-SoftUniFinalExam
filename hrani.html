<!doctype html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Каталог на храните – Здравословен Живот</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <div id="navbar"></div>
  <main class="container py-4">
    <div class="page-header">
      <h1>Каталог на храните</h1>
      <p class="text-muted">Калории и макронутриенти на 100г</p>
    </div>
    <div class="mb-3">
      <input type="search" id="searchInput" class="form-control" placeholder="Търсене по име..." />
    </div>
    <div class="d-flex flex-wrap gap-2 mb-3" id="categoryFilters"></div>
    <p class="text-muted small" id="foodCount"></p>
    <div class="table-responsive d-none d-lg-block">
      <table class="table table-hover table-foods bg-white rounded shadow-sm">
        <thead><tr><th>Храна</th><th>Категория</th><th>Калории</th><th>П (г)</th><th>В (г)</th><th>М (г)</th></tr></thead>
        <tbody id="foodsTableBody"></tbody>
      </table>
    </div>
    <div class="row g-2 d-lg-none" id="foodsCards"></div>
  </main>
  <div id="footer"></div>
  <script type="module" src="/src/js/pages/hrani.js"></script>
</body>
</html>
