<!doctype html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация – Здравословен Живот</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <div id="navbar"></div>
  <main class="container py-5">
    <div class="row justify-content-center align-items-center g-4">
      <div class="col-lg-5 d-none d-lg-block">
        <img
          src="https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=800&h=1000&fit=crop"
          class="img-fluid rounded-3 shadow auth-side-image w-100"
          alt="Активен начин на живот"
          loading="lazy"
        />
      </div>
      <div class="col-md-8 col-lg-5">
        <div class="text-center mb-4">
          <i class="bi bi-leaf text-success display-4"></i>
          <h2 class="mt-2">Регистрация</h2>
        </div>
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <div id="registerError" class="alert alert-danger d-none"></div>
            <div id="registerSuccess" class="alert alert-success d-none"></div>
            <form id="registerForm">
              <div class="mb-3">
                <label class="form-label">Име</label>
                <input type="text" name="fullName" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Имейл</label>
                <input type="email" name="email" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Парола</label>
                <input type="password" name="password" class="form-control" minlength="6" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Потвърди парола</label>
                <input type="password" name="confirmPassword" class="form-control" required />
              </div>
              <button type="submit" class="btn btn-success w-100"><i class="bi bi-person-plus"></i> Регистрирай се</button>
            </form>
            <p class="text-center mt-3 mb-0 small">Вече имате акаунт? <a href="/login.html">Влезте</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="footer"></div>
  <script type="module" src="/src/js/pages/register.js"></script>
</body>
</html>
